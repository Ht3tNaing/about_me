<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Naing Htet Aung</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" type="image/png" href="/assets/aura_player_logo.png" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --text-muted: #5b6676;
      --accent: #2563eb;
      --accent-2: #0d9488;
      --accent-hover: #1d4ed8;
      --border: #e3e8ef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(900px 400px at 80% -10%, rgba(37, 99, 235, 0.1), transparent 60%),
        radial-gradient(700px 380px at 10% 10%, rgba(13, 148, 136, 0.08), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .wrap { max-width: 560px; }

    .code {
      font-size: clamp(5rem, 22vw, 11rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      margin: 10px 0 14px;
    }

    p {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 13px 30px;
      border-radius: 999px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.28);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>Sorry, the page you are looking for doesn't exist or has been moved.</p>
    <a class="btn" href="/">Back to Home</a>
  </main>
</body>
</html>
